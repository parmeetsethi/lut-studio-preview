<title>GPU Preview Demo</title>

<script>// gpu-preview.js — standalone WebGL2 LUT preview for LUT Studio's live drag path.
// ZERO colour maths: it only APPLIES a colour look-up table on the GPU. The table
// is built by the host's own applyAllInto (dependency-injected), so the preview can
// never drift from the exported .cube. Drop-in usage:
//   const gpu = createGpuPreview({ applyAllInto });
//   if (gpu.isSupported) {
//     gpu.attach(previewCanvas);        // once
//     gpu.setImage(photo);              // on image load (ImageData or canvas/img/bitmap)
//     gpu.render(state);                // per drag frame  -> shows the overlay
//     gpu.hide();                       // on release -> caller renders full CPU path
//   } else { /* caller uses its existing CPU preview path */ }
function createGpuPreview(opts) {
  const applyAllInto = opts && opts.applyAllInto;
  const N = (opts && opts.gridSize) || 17;
  if (typeof applyAllInto !== 'function') throw new Error('createGpuPreview: applyAllInto is required');

  const VS = `#version 300 es
in vec2 p;out vec2 uv;void main(){uv=vec2(p.x*0.5+0.5,1.0-(p.y*0.5+0.5));gl_Position=vec4(p,0.0,1.0);}`;
  const FS = `#version 300 es
precision highp float;in vec2 uv;out vec4 o;uniform sampler2D src;uniform highp sampler2D lut;uniform float N;
vec3 fetchN(int r,int g,int b){return texelFetch(lut,ivec2(b*int(N)+r,g),0).rgb;}
vec3 look(vec3 c){float NM1=N-1.0;vec3 cf=clamp(c,0.0,1.0)*NM1;float r0=floor(cf.r),g0=floor(cf.g),b0=floor(cf.b);int R0=int(r0),G0=int(g0),B0=int(b0);int R1=int(min(r0+1.0,NM1)),G1=int(min(g0+1.0,NM1)),B1=int(min(b0+1.0,NM1));float dr=cf.r-r0,dg=cf.g-g0,db=cf.b-b0;
vec3 c000=fetchN(R0,G0,B0),c100=fetchN(R1,G0,B0),c010=fetchN(R0,G1,B0),c110=fetchN(R1,G1,B0),c001=fetchN(R0,G0,B1),c101=fetchN(R1,G0,B1),c011=fetchN(R0,G1,B1),c111=fetchN(R1,G1,B1);
vec3 c00=mix(c000,c100,dr),c10=mix(c010,c110,dr),c01=mix(c001,c101,dr),c11=mix(c011,c111,dr);return mix(mix(c00,c10,dg),mix(c01,c11,dg),db);}
void main(){o=vec4(look(texture(src,uv).rgb),1.0);}`;

  let gl = null, glc = null, prog = null, srcTex = null, lutTex = null, quad = null;
  const uLoc = {};
  let target = null, lutBuf = null;

  function compile(type, s) { const x = gl.createShader(type); gl.shaderSource(x, s); gl.compileShader(x); if (!gl.getShaderParameter(x, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(x)); return x; }

    const g = glc.getContext('webgl2', { antialias: false, preserveDrawingBuffer: true });

    gl = g;
    prog = gl.createProgram();

    }
    gl.bindTexture(gl.TEXTURE_2D, lutTex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, W, H, 0, gl.RGBA, gl.FLOAT, buf);
  }

  function buildCoarse(state) {
    const arr = new Float32Array(N * N * N * 3), tmp = new Float32Array(3), NM1 = N - 1;
    for (let bi = 0; bi < N; bi++) { const b = bi / NM1; for (let gi = 0; gi < N; gi++) { const g = gi / NM1; const rb = (bi * N * N + gi * N) * 3; for (let ri = 0; ri < N; ri++) { const r = ri / NM1; applyAllInto(r, g, b, state, tmp); const idx = rb + ri * 3; arr[idx] = tmp[0]; arr[idx + 1] = tmp[1]; arr[idx + 2] = tmp[2]; } } }

  }

  function align() {
    if (!target) return;
    const pr = glc.parentElement.getBoundingClientRect();
    const cr = target.getBoundingClientRect();
    glc.style.left = (cr.left - pr.left) + 'px';
    glc.style.top = (cr.top - pr.top) + 'px';
    glc.style.width = cr.width + 'px';   // CSS box = on-screen rect (NOT image px)
    glc.style.height = cr.height + 'px';
  }

  return {
    isSupported: supported,
    gridSize: N,
    canvas: glc,
    attach(targetCanvas) {
      if (!supported) return;
      target = targetCanvas;
      const par = target.parentElement;
      if (getComputedStyle(par).position === 'static') par.style.position = 'relative';

    setImage(source) { if (supported) uploadSrc(source); },
    render(state) {
      if (!supported) return;
      const lut = buildCoarse(state);
      gl.viewport(0, 0, glc.width, glc.height);
      gl.useProgram(prog);
      gl.bindBuffer(gl.ARRAY_BUFFER, quad);
      gl.enableVertexAttribArray(0);
      gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, srcTex); gl.uniform1i(uLoc.src, 0);
      gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, lutTex); gl.uniform1i(uLoc.lut, 1);
      gl.uniform1f(uLoc.N, N);

      gl.drawArrays(gl.TRIANGLES, 0, 3);
      align();
      glc.style.display = 'block';
    },
    hide() { if (glc) glc.style.display = 'none'; },
    detach() { if (glc) { glc.style.display = 'none'; if (glc.parentElement) glc.parentElement.removeChild(glc); } },
  };
}
</script>
<script>
  const st = defaultState();
  const canvas = document.getElementById('preview');
  const ctx = canvas.getContext('2d');
  const note = document.getElementById('note');
  let gpu = null;
  const img = new Image(); img.crossOrigin = 'anonymous';
  img.onload = () => {
    canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);
    gpu = createGpuPreview({ applyAllInto });
    if (!gpu.isSupported) { note.textContent = 'WebGL2 unavailable — GPU preview not supported on this browser.'; return; }
    gpu.attach(canvas); gpu.setImage(img); gpu.render(st);
  };
  img.onerror = () => { note.textContent = 'Sample image failed to load (needs internet).'; };
  img.src = "https://images.unsplash.com/photo-1675773051474-55c4b7d2cf53?w=1080&q=80&fm=jpg&auto=format&fit=crop";
  function bind(id, apply) {
    const el = document.getElementById('s_' + id), out = document.getElementById('o_' + id);
    el.addEventListener('input', () => { out.textContent = el.value; apply(parseFloat(el.value)); if (gpu && gpu.isSupported) gpu.render(st); });
